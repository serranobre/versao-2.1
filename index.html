<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Relatórios — Serra Nobre</title>
  <style>
    :root{ --bg:#0b132b; --card:#ffffff; --muted:#475569; --pri:#0ea5a6; --pri-900:#0f766e; }
    *{ box-sizing:border-box }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; background:#f1f5f9; color:#0f172a }
    header{ display:flex; gap:12px; align-items:center; padding:12px 16px; background:var(--pri-900); color:#fff; position:sticky; top:0; z-index:2 }
    header h1{ font-size:18px; margin:0; font-weight:700; letter-spacing:.4px }
    header button{ margin-left:auto; background:#064e3b; color:#fff; border:0; padding:8px 12px; border-radius:8px; cursor:pointer }
    main{ max-width:1200px; margin:16px auto; padding:0 12px 40px }
    .card{ background:var(--card); border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.06); padding:14px }
    .filters{ display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px }
    label{ font-size:12px; color:#334155; display:block; margin-bottom:4px }
    input, select{ width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:8px; outline:0 }
    .actions{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px }
    .btn{ border:1px solid #0ea5a6; background:#0ea5a6; color:#fff; padding:8px 12px; border-radius:8px; cursor:pointer }
    .btn.ghost{ background:#fff; color:#0ea5a6 }
    .btn.warn{ background:#ef4444; border-color:#ef4444 }
    .table-wrap{ margin-top:14px; overflow:auto; border-radius:10px; border:1px solid #e2e8f0 }
    table{ width:100%; border-collapse:collapse; min-width:960px; background:#fff }
    thead th{ position:sticky; top:0; background:#f8fafc; border-bottom:1px solid #e2e8f0; text-align:left; font-size:12px; color:#334155; padding:10px }
    tbody td{ border-bottom:1px solid #f1f5f9; padding:10px; font-size:14px }
    tfoot td{ background:#f8fafc; font-weight:600; padding:10px }
    .badge{ font-size:11px; border-radius:999px; padding:2px 8px; background:#e2e8f0; color:#0f172a; display:inline-block }
    .status-ABERTO{ background:#fee2e2; color:#991b1b }
    .status-EM_ANDAMENTO{ background:#ffedd5; color:#9a3412 }
    .status-ENTREGUE{ background:#dcfce7; color:#166534 }
    .status-CANCELADO{ background:#f1f5f9; color:#334155; text-decoration:line-through }
    .pager{ display:flex; gap:8px; align-items:center; margin-top:10px }
    .pager button{ padding:6px 10px; border-radius:8px; border:1px solid #e2e8f0; background:#fff; cursor:pointer }
    .pager .info{ font-size:13px; color:#475569 }
    .totais{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-top:12px }
    .kpi{ background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px }
    .kpi .title{ font-size:12px; color:#64748b }
    .kpi .val{ font-size:18px; font-weight:700; margin-top:6px }
    @media print { header,.actions,.pager{ display:none!important } body{ background:#fff } main{ max-width:100%; margin:0; padding:0 } .card{ box-shadow:none; border:0; padding:0 } .table-wrap{ border:0 } }
    @page{ size:A4 portrait; margin:12mm }
  </style>
</head>
<body>
  <header>
    <h1>Relatórios de Pedidos</h1>
    <button id="btnInstall" hidden>Instalar</button>
    <button id="btnLogin">Entrar</button>
  </header>

  <main>
    <section class="card">
      <div class="filters">
        <div><label>Data entrega — de</label><input type="date" id="fDataIni"></div>
        <div><label>Data entrega — até</label><input type="date" id="fDataFim"></div>
        <div><label>Horário — de</label><input type="time" id="fHoraIni"></div>
        <div><label>Horário — até</label><input type="time" id="fHoraFim"></div>
        <div><label>Cliente</label><input type="text" id="fCliente" placeholder="Nome (contém)"></div>
        <div><label>Status</label>
          <select id="fStatus">
            <option value="">Todos</option>
            <option value="ABERTO">Aberto</option>
            <option value="EM_ANDAMENTO">Em andamento</option>
            <option value="ENTREGUE">Entregue</option>
            <option value="CANCELADO">Cancelado</option>
          </select>
        </div>

        <div><label>Produto (contém)</label><input type="text" id="fProduto" placeholder="Ex.: MAMINHA"></div>
        <div><label>Valor mín. (R$)</label><input type="number" step="0.01" id="fVmin"></div>
        <div><label>Valor máx. (R$)</label><input type="number" step="0.01" id="fVmax"></div>
        <div><label>Vendedor</label><input type="text" id="fVendedor" placeholder="Leo / Serra Nobre"></div>
        <div><label>Pagamento</label>
          <select id="fPagamento">
            <option value="">Todos</option>
            <option>Dinheiro</option><option>Pix</option><option>Cartão</option><option>A prazo</option>
          </select>
        </div>
        <div><label>Entrega</label>
          <select id="fEntrega">
            <option value="">Todos</option>
            <option value="RETIRADA">Retirada</option><option value="ENTREGA">Entrega</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btnBuscar">Buscar</button>
        <button class="btn ghost" id="btnLimpar">Limpar</button>
        <button class="btn" id="btnImprimir">Imprimir A4</button>
        <button class="btn ghost" id="btnA4Landscape">A4 paisagem</button>
        <button class="btn ghost" id="btnCSV">Exportar CSV</button>
        <button class="btn warn" id="btnSair" title="Sair da sessão">Sair</button>
      </div>

      <div class="totais" id="totais"></div>

      <div class="table-wrap">
        <table id="tbl">
          <thead>
            <tr>
              <th>Data entrega</th><th>Hora</th><th>Cliente</th><th>Itens</th>
              <th>Total (R$)</th><th>Status</th><th>Vendedor</th>
              <th>Pagamento</th><th>Tipo Entrega</th><th>Obs</th><th>ID</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
          <tfoot><tr><td colspan="11" id="resumo">0 pedidos</td></tr></tfoot>
        </table>
      </div>

      <div class="pager">
        <button id="prev">&larr; Anterior</button>
        <div class="info" id="pgInfo">Página 1</div>
        <button id="next">Próxima &rarr;</button>
        <div class="info" id="tempo">—</div>
      </div>
    </section>
  </main>

  <!-- Firebase (Compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>
  <script>
    // PWA install prompt
    let deferred;
    window.addEventListener('beforeinstallprompt', (e)=>{
      e.preventDefault(); deferred = e;
      document.getElementById('btnInstall').hidden = false;
    });
    document.getElementById('btnInstall').onclick = async ()=>{
      if(!deferred) return; deferred.prompt(); await deferred.userChoice;
      deferred = null; document.getElementById('btnInstall').hidden = true;
    };
    // Service Worker
    if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
  </script>
</body>
</html>
